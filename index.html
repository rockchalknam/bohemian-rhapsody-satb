<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bohemian Rhapsody SATB Learning Player</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a1a;
        }
        .subtitle {
            color: #666;
            margin-bottom: 32px;
            font-size: 15px;
        }
        .section-header {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            margin-top: 24px;
        }
        .section-header:first-child {
            margin-top: 0;
        }
        .lyrics-box {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid #e0e0e0;
        }
        .lyrics-box h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #1a1a1a;
        }
        .part-lyrics {
            margin-bottom: 12px;
            padding-left: 12px;
            border-left: 3px solid #999;
            padding-top: 6px;
            padding-bottom: 6px;
        }
        .part-lyrics:last-child {
            margin-bottom: 0;
        }
        .part-label {
            font-size: 11px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .part-text {
            font-size: 14px;
            color: #1a1a1a;
            line-height: 1.4;
        }
        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        .button-grid.full {
            grid-template-columns: 1fr;
        }
        .button-grid.four {
            grid-template-columns: repeat(4, 1fr);
        }
        button {
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background: white;
            color: #1a1a1a;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: #f5f5f5;
            border-color: #999;
        }
        button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        button.primary {
            background: #667eea;
            color: white;
            border-color: #667eea;
            padding: 12px;
            font-size: 14px;
        }
        button.primary:hover {
            background: #5568d3;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        input[type="range"] {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
        }
        .info-box {
            background: #f0f4ff;
            border: 1px solid #d0e0ff;
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            color: #333;
            line-height: 1.6;
            margin-top: 24px;
        }
        .info-box strong {
            color: #667eea;
        }
        .info-box ul {
            margin: 8px 0 0 16px;
            padding: 0;
        }
        .info-box li {
            margin-bottom: 6px;
        }
        .speed-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .speed-value {
            font-size: 13px;
            font-weight: 600;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        function BohemianRhapsodyPlayer() {
            const audioRef = useRef(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentTime, setCurrentTime] = useState(0);
            const [duration, setDuration] = useState(0);
            const [playbackRate, setPlaybackRate] = useState(1);
            const [selectedSection, setSelectedSection] = useState('intro');

            const sections = {
                intro: {
                    name: 'Intro: Is This the Real Life',
                    startTime: 0,
                    endTime: 35,
                    lyrics: {
                        soprano: 'Is this the real life? Is this just fantasy?',
                        alto: 'Is this the real life? Is this just fantasy?',
                        tenor: 'Is this the real life?',
                        bass: 'Is this the real life?'
                    }
                },
                verse1: {
                    name: 'Verse 1: Caught in a Landslide',
                    startTime: 35,
                    endTime: 65,
                    lyrics: {
                        soprano: 'Caught in a landslide, no escape from reality',
                        alto: 'Caught in a landslide, no escape from reality',
                        tenor: 'Caught in a landslide',
                        bass: 'Caught in a landslide'
                    }
                },
                verse2: {
                    name: 'Verse 2: Poor Boy',
                    startTime: 65,
                    endTime: 95,
                    lyrics: {
                        soprano: "I'm just a poor boy, I need no sympathy",
                        alto: 'Poor boy, I need no sympathy',
                        tenor: 'Poor boy',
                        bass: 'Poor boy'
                    }
                },
                chorus: {
                    name: 'Chorus: Easy Come, Easy Go',
                    startTime: 95,
                    endTime: 130,
                    lyrics: {
                        soprano: 'Easy come, easy go, little high, little low',
                        alto: 'Easy go, little high, little low',
                        tenor: 'Easy come, easy go',
                        bass: 'Easy come, easy go'
                    }
                },
                mama: {
                    name: 'Mama Section: Mama, Just Killed a Man',
                    startTime: 130,
                    endTime: 180,
                    lyrics: {
                        soprano: 'Mama, just killed a man',
                        alto: 'Mama, Mama, just killed a man',
                        tenor: 'Mama, Mama',
                        bass: 'Mama, ooh'
                    }
                }
            };

            const currentSection = sections[selectedSection];

            const togglePlay = () => {
                if (audioRef.current) {
                    if (isPlaying) {
                        audioRef.current.pause();
                    } else {
                        audioRef.current.play();
                    }
                    setIsPlaying(!isPlaying);
                }
            };

            const playSection = () => {
                if (audioRef.current) {
                    audioRef.current.currentTime = currentSection.startTime;
                    audioRef.current.play();
                    setIsPlaying(true);
                }
            };

            const handleTimeUpdate = () => {
                if (audioRef.current) {
                    setCurrentTime(audioRef.current.currentTime);
                    if (audioRef.current.currentTime >= currentSection.endTime && isPlaying) {
                        audioRef.current.pause();
                        setIsPlaying(false);
                    }
                }
            };

            const handleLoadedMetadata = () => {
                if (audioRef.current) {
                    setDuration(audioRef.current.duration);
                }
            };

            const handleRateChange = (rate) => {
                setPlaybackRate(rate);
                if (audioRef.current) {
                    audioRef.current.playbackRate = rate;
                }
            };

            return (
                <div className="container">
                    <audio
                        ref={audioRef}
                        onTimeUpdate={handleTimeUpdate}
                        onLoadedMetadata={handleLoadedMetadata}
                        style={{ display: 'none' }}
                    >
                        <source src="bohemian.mp3" type="audio/mpeg" />
                    </audio>

                    <h1>Bohemian Rhapsody SATB</h1>
                    <p className="subtitle">Learn your part with reference audio</p>

                    <div className="lyrics-box">
                        <h3>{currentSection.name}</h3>
                        {Object.entries(currentSection.lyrics).map(([partName, lyric]) => (
                            <div key={partName} className="part-lyrics">
                                <div className="part-label">{partName}</div>
                                <div className="part-text">{lyric}</div>
                            </div>
                        ))}
                    </div>

                    <div className="section-header">Select section</div>
                    <div className="button-grid">
                        {Object.entries(sections).map(([key, section]) => (
                            <button
                                key={key}
                                onClick={() => setSelectedSection(key)}
                                className={selectedSection === key ? 'active' : ''}
                            >
                                {section.name.split(':')[0]}
                            </button>
                        ))}
                    </div>

                    <div className="section-header">Playback speed</div>
                    <div className="speed-display">
                        <span>Speed</span>
                        <span className="speed-value">{playbackRate.toFixed(2)}x</span>
                    </div>
                    <div className="button-grid four">
                        {[0.75, 1, 1.25, 1.5].map(rate => (
                            <button
                                key={rate}
                                onClick={() => handleRateChange(rate)}
                                className={playbackRate === rate ? 'active' : ''}
                            >
                                {rate}x
                            </button>
                        ))}
                    </div>

                    <div className="section-header">Controls</div>
                    <div className="button-grid full">
                        <button onClick={playSection} className="primary">
                            ▶ Play section
                        </button>
                    </div>
                    <div className="button-grid full">
                        <button onClick={togglePlay} className="primary">
                            {isPlaying ? '⏸ Pause' : '▶ Play all'}
                        </button>
                    </div>

                    <div className="info-box">
                        <strong>How to use:</strong>
                        <ul>
                            <li>Select a section to see the lyrics for all parts</li>
                            <li>Use playback speed to slow it down while you practice</li>
                            <li>Click "Play section" to start from the beginning of that part</li>
                            <li>Sing along with your part and listen to the harmony</li>
                        </ul>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<BohemianRhapsodyPlayer />, document.getElementById('root'));
    </script>
</body>
</html>
